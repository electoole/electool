<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Electoral Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #f6f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-panel {
            width: min(420px, calc(100vw - 32px));
            background: #fff;
            border: 1px solid #d8dee6;
            border-radius: 4px;
            padding: 28px;
        }
        .password-wrap {
            position: relative;
        }
        .password-wrap .form-control {
            padding-right: 48px;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #41516a;
            padding: 4px;
            line-height: 1;
        }
        .password-toggle svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <h1 class="h4 mb-2">Admin Access</h1>
        <p class="text-muted mb-4">Sign in to manage campaign data.</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrap">
                    <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    <button class="password-toggle" id="password-toggle" type="button" aria-label="Show password" title="Show password">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Sign in</button>
        </form>
        <a class="d-inline-block mt-3" href="/">Back to dashboard</a>
    </main>
    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('password-toggle');
        toggleButton.addEventListener('click', () => {
            const showing = passwordInput.type === 'text';
            passwordInput.type = showing ? 'password' : 'text';
            toggleButton.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
            toggleButton.setAttribute('title', showing ? 'Show password' : 'Hide password');
        });
    </script>
</body>
</html>
